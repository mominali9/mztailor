{% extends 'base.html' %}
{% block title %}{% if category %}Edit Category{% else %}Add Category{% endif %} | Admin{% endblock %}

{% block content %}
<div class="bg-gray-900 min-h-screen text-white pt-24 pb-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-4 mb-8">
            <a href="{% url 'manage_categories' %}" class="bg-white/10 hover:bg-white/20 p-2 rounded-lg text-gray-300">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-3xl font-playfair font-bold text-gold">{% if category %}Edit Category{% else %}Add Category{% endif %}</h1>
            </div>
        </div>

        <div class="premium-card p-10">
            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-gold opacity-80">Category Name</label>
                        <input type="text" name="name" value="{{ category.name|default:'' }}" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-gold/50 focus:outline-none transition-all">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-gold opacity-80">Category Image</label>
                        <input type="file" name="image" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-400 file:bg-gold/20 file:text-gold file:px-4 file:py-2 file:rounded-full file:border-0 hover:file:bg-gold/30">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-gold opacity-80">Description</label>
                        <textarea name="description" rows="5" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-gold/50 focus:outline-none transition-all">{{ category.description|default:'' }}</textarea>
                    </div>
                </div>

                <div class="pt-6 border-t border-white/5 flex gap-4">
                    <button type="submit" class="bg-gold hover:bg-dark-gold text-white font-bold py-4 px-10 rounded-2xl transition-all">Save Category</button>
                    <a href="{% url 'manage_categories' %}" class="bg-white/5 hover:bg-white/10 text-white font-bold py-4 px-10 rounded-2xl transition-all">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
